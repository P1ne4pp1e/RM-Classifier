# ================================================================
# RM-Classifier 配置文件
# 所有可调参数集中管理，修改此文件无需改动代码
# ================================================================

# ==================== 数据集配置 ====================
dataset:
  root: datasets/armor_dataset-20251210  # 数据集根目录（相对于项目根）
  none_class_name: collection-none        # None类的文件夹名
  image_size: [32, 32]                    # 输入图像尺寸 [H, W]
  image_format: "*.png"                   # 图像文件格式
  val_split: 0.2                          # 验证集比例（从正常类中划分）
  random_seed: 42                         # 随机种子，影响数据划分和聚类初始化

# ==================== 特征提取配置 ====================
features:

  # PCA 降维原始像素（主力特征，保留所有空间细节）
  # 32x32=1024维二值像素展平后通过PCA压缩，自动学习最具判别力的方向
  pca:
    enabled: true
    variance_ratio: 0.85   # 保留多少方差比例 [0~1]，通常降到 40~80 维
                           # 增大→特征更完整但维度更高；减小→更快但可能丢细节
                           # 注意：维度应远小于每类样本数（建议 < 样本数/5）

  # Hu 矩（7维，全局形状不变量）
  # 对平移/缩放/旋转具有不变性，捕获整体形状轮廓
  hu_moments:
    enabled: true

  # 轮廓傅里叶描述子（形状边界频域细节）
  # 低频系数→整体形状，高频系数→锯齿/突起/凹口等细节
  # 对平移、缩放、旋转不变
  fourier_descriptors:
    enabled: true
    n_descriptors: 20      # 保留前 N 个傅里叶系数 [建议 10~30]
                           # 增大→更多形状细节；减小→更快更鲁棒

  # 拓扑特征（4维）：连通域数量、Euler数、白色像素占比、边界框宽高比
  # 描述图像的拓扑结构，对各类变换高度鲁棒
  topology:
    enabled: true

  # LBP 局部二值模式直方图（可选，59维 uniform 模式）
  # 捕获局部邻域像素关系，适合纹理区分
  # 注意：对于纯二值图，信息增益相对有限，默认关闭
  lbp:
    enabled: false
    radius: 1              # LBP 采样半径
    n_points: 8            # LBP 采样点数（标准组合：8点半径1，16点半径2）

  # 多尺度像素密度网格（可选）
  # 将图像分成 NxN 格子，计算每格白色像素占比，描述空间分布
  density_grid:
    enabled: false
    scales: [4, 8]         # 格子数量，4→4x4=16维，8→8x8=64维

# ==================== 聚类配置 ====================
clustering:
  k_per_class: 15          # 每个正常类的 K-Means 聚类中心数量
                           # 增大→捕获更多类内变化，但推理时质心总数也增多
                           # 建议范围：10~25，小数据集用小值，大数据集用大值
  n_init: 100               # K-Means 随机初始化次数（取最优结果）
                           # 增大→更稳定的质心，但训练更慢；建议 10~30
  max_iter: 1000            # K-Means 单次运行最大迭代次数
  random_seed: 20260306

# ==================== 开放集拒绝配置 ====================
# 推理时，若样本距所有质心都"太远"，则判定为 None
# 阈值由正常类验证集的分位数自动校准，不依赖 None 训练数据
rejection:

  # 主要机制：样本到最近质心的欧氏距离阈值
  # 阈值 = 正常类训练样本最近质心距离的第 P 分位数
  # 增大 P → 更宽松（误拒少，但 None 漏检多）
  # 减小 P → 更严格（误拒多，但 None 漏检少）
  distance_percentile: 90.0   # 建议范围：90~98

  # 辅助机制：马氏距离（考虑类内协方差分布形状）
  # 与距离阈值取并集：任一触发即判 None
  mahalanobis:
    enabled: true
    percentile: 98.0           # 马氏距离阈值的分位数
    regularization: 1.0e-4     # 协方差矩阵正则化系数，防止奇异
                               # 若出现数值不稳定，适当增大（如 1e-3）
                               # 注意：只有在 PCA 维度 << 样本数/5 时才稳定可用

# ==================== 输出配置 ====================
output:
  model_path: output/cluster_model.joblib      # 训练产物：模型文件
  report_path: output/evaluation_report.txt    # 评估报告
  plots_dir: output/plots                      # 可视化图表输出目录
  verbose: true              # 是否打印训练/评估过程详情
